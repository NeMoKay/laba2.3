<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sparse Matrix GUI</title>
    <style>
        :root{
            --bg-color: #0b0710;
            --panel-bg: rgba(21, 14, 31, 0.85);
            --primary: #9d4edd;
            --primary-hover: #e0aaff;
            --text: #e0d4f5;
            --border: #5a189a;
            --accent: #c77dff;
            --success: #4cc9f0;
        }
        body{
            background-color: var(--bg-color); color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b0710 0%, #1c0b2b 100%);
        }
        h1{
            color: var(--primary-hover); text-shadow: 0 0 15px var(--primary);
            margin: 10px 0 30px 0; font-size: 2.5em; letter-spacing: 2px; text-transform: uppercase;
        }
        .container{
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 30px;
            width: 100%; max-width: 1000px;
            box-shadow: 0 0 25px rgba(157, 78, 221, 0.3);
            backdrop-filter: blur(10px);
        }
        .header-controls{
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px;
        }
        select{
            background: #240046; border: 1px solid var(--border); color: white;
            padding: 10px 15px; border-radius: 8px; font-size: 1.1em; outline: none; cursor: pointer;
        }
        button{
            background: var(--primary); color: white; border: none;
            padding: 10px 16px; border-radius: 6px; font-size: 0.95em;
            cursor: pointer; transition: all 0.2s ease;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover{ background: var(--accent); box-shadow: 0 0 15px var(--primary-hover); transform: translateY(-1px); }
        button:active{ transform: translateY(1px); }
        
        .log{ font-size: 1.1em; color: #a491bc; margin-bottom: 25px; border-left: 4px solid var(--accent); padding-left: 10px;}
        
        .split-layout{ display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .matrix-card{
            border: 1px solid var(--border); padding: 20px; border-radius: 10px;
            background: rgba(36, 0, 70, 0.3); display: flex; flex-direction: column; align-items: center;
        }
        .matrix-card h2{ margin-top: 0; color: var(--primary-hover); font-size: 1.5em; margin-bottom: 15px; }
        
        .input-row{ display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        input{
            background: #10002b; border: 1px solid var(--border); color: white;
            padding: 8px 10px; border-radius: 6px; outline: none; font-size: 1em; text-align: center; width: 60px;
        }
        input:focus{ border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
        
        .matrix-display{
            display: grid; gap: 5px; background: #000; padding: 15px; border-radius: 8px;
            border: 1px solid var(--border); box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
            margin-top: 15px; justify-content: center; overflow-x: auto; width: 100%; box-sizing: border-box;
        }
        .cell{
            background: #1a0b2e; border: 1px solid var(--primary); color: var(--accent);
            padding: 15px 10px; text-align: center; font-family: 'Courier New', Courier, monospace;
            font-size: 1.2em; border-radius: 4px; cursor: pointer; transition: 0.2s; min-width: 40px;
        }
        .cell:hover{ background: var(--primary); color: white; transform: scale(1.05); }
        .cell.zero{ color: #555; border-color: #333; }
        .cell.readonly{ cursor: default; }
        .cell.readonly:hover{ background: #1a0b2e; color: var(--success); transform: none; border-color: var(--success); }

        .ops-panel{
            display: flex; justify-content: center; gap: 15px; padding: 20px;
            border: 1px solid var(--border); border-radius: 10px; background: rgba(36, 0, 70, 0.3); margin-bottom: 20px;
        }
        .ops-panel button{ font-size: 1.1em; padding: 12px 25px; }
        
        #res-card{ display: none; border-color: var(--success); }
        #res-card h2{ color: var(--success); }
    </style>
</head>
<body>
    <h1>Sparse Matrix Lab</h1>
    <div class="container">
        <div class="header-controls">
            <select id="dataType" onchange="load()">
                <option value="int">Integer</option>
                <option value="double">Double</option>
                <option value="complex">Complex</option>
            </select>
            <button onclick="req('clear')" style="background: #e5383b;">Clear All</button>
        </div>
        
        <div class="log" id="log">Status: Initialized</div>

        <div class="split-layout">
            <div class="matrix-card">
                <h2>Matrix A</h2>
                <div class="input-row">
                    R: <input type="number" id="rowsA" value="3" min="1">
                    C: <input type="number" id="colsA" value="3" min="1">
                    <button onclick="createMat('A')">Create</button>
                </div>
                <div id="grid-A" class="matrix-display"></div>
                <button onclick="calcNorm('A')" style="margin-top: 15px; width: 100%; background: #3c096c;">Norm ||A||</button>
                <button onclick="multScalar('A')" style="margin-top: 10px; width: 100%; background: #5a189a;">* Scalar</button>
            </div>

            <div class="matrix-card">
                <h2>Matrix B</h2>
                <div class="input-row">
                    R: <input type="number" id="rowsB" value="3" min="1">
                    C: <input type="number" id="colsB" value="3" min="1">
                    <button onclick="createMat('B')">Create</button>
                </div>
                <div id="grid-B" class="matrix-display"></div>
                <button onclick="calcNorm('B')" style="margin-top: 15px; width: 100%; background: #3c096c;">Norm ||B||</button>
                <button onclick="multScalar('B')" style="margin-top: 10px; width: 100%; background: #5a189a;">* Scalar</button>
            </div>
        </div>

        <div class="ops-panel">
            <button onclick="req('add')" style="background: var(--success); color: #000;">A + B</button>
            <button onclick="req('mult')" style="background: var(--success); color: #000;">A * B</button>
        </div>

        <div class="matrix-card" id="res-card">
            <h2>Result Matrix</h2>
            <div id="grid-Res" class="matrix-display"></div>
        </div>
    </div>

    <script>
        const load = () => req('get_state');

        async function req(endpoint, payload = {}){
            payload.dataType = document.getElementById('dataType').value;
            
            let url = `/api/${endpoint}`;
            let options ={ method: 'GET' };

            if (['create', 'set', 'add', 'mult', 'norm', 'mult_scalar'].includes(endpoint)){
                options ={
                    method: 'POST',
                    headers:{ 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                };
            } 
            else{
                url += '?' + new URLSearchParams(payload).toString();
            }

            try{
                const res = await fetch(url, options);
                const json = await res.json();
                renderState(json.state);
                document.getElementById('log').innerText = "Status: " + json.log;
            } 
            catch(e){
                document.getElementById('log').innerText = "Status: Error communicating with server";
            }
        }

        function createMat(target){
            req('create',{
                target: target,
                rows: parseInt(document.getElementById(`rows${target}`).value) || 3,
                cols: parseInt(document.getElementById(`cols${target}`).value) || 3
            });
        }

        function calcNorm(target){
            req('norm',{ target: target });
        }

        function multScalar(target){
            const dt = document.getElementById('dataType').value;
            const msg = dt === 'complex' ? `Enter scalar for ${target} (format: re,im or just re):` : `Enter scalar for ${target}:`;
            const input = prompt(msg, "1");
            
            if (input === null) return;
            
            let re = 0, im = 0;
            if (dt === 'complex'){
                const parts = input.split(',').map(s => s.trim());
                re = parseFloat(parts[0]) || 0;
                im = parseFloat(parts[1]) || 0;
            } 
            else{
                re = parseFloat(input) || 0;
            }
            
            req('mult_scalar',{ target: target, scalar_re: re, scalar_im: im });
        }

        function editCell(target, r, c){
            const dt = document.getElementById('dataType').value;
            const msg = dt === 'complex' ? `Enter new value for ${target}[${r}][${c}] (format: re,im or just re):` : `Enter new value for ${target}[${r}][${c}]:`;
            const input = prompt(msg, "0");
            
            if (input === null) return;
            
            let re = 0, im = 0;
            if (dt === 'complex'){
                const parts = input.split(',').map(s => s.trim());
                re = parseFloat(parts[0]) || 0;
                im = parseFloat(parts[1]) || 0;
            } 
            else{
                re = parseFloat(input) || 0;
            }
            
            req('set',{ target: target, r: r, c: c, val_re: re, val_im: im });
        }

        function renderState(state){
            renderGrid('A', state.A, true);
            renderGrid('B', state.B, true);
            
            const resCard = document.getElementById('res-card');
            if (state.Res && state.Res.rows > 0){
                resCard.style.display = 'flex';
                renderGrid('Res', state.Res, false);
            } 
            else{
                resCard.style.display = 'none';
            }
        }

        function renderGrid(target, matrixData, isEditable){
            const container = document.getElementById(`grid-${target}`);
            container.innerHTML = '';
            
            if (!matrixData || matrixData.rows === 0 || matrixData.cols === 0){
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'grid';
            container.style.gridTemplateColumns = `repeat(${matrixData.cols}, auto)`;
            
            for (let r = 0; r < matrixData.rows; r++){
                for (let c = 0; c < matrixData.cols; c++){
                    const div = document.createElement('div');
                    const val = matrixData.grid[r][c];
                    
                    div.className = 'cell';
                    if (val === '0') div.classList.add('zero');
                    if (!isEditable) div.classList.add('readonly');
                    
                    div.innerText = val;
                    if (isEditable) div.onclick = () => editCell(target, r, c);
                    
                    container.appendChild(div);
                }
            }
        }
        
        load();
    </script>
</body>
</html>
